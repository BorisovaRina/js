<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тема 12: Асинхронный код</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 { color: #333; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            border-bottom: 3px solid #00f2fe;
            padding-bottom: 15px;
        }
        button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        button:hover { transform: translateY(-2px); }
        #result {
            background: #f8f9fa;
            border-left: 4px solid #00f2fe;
            padding: 20px;
            margin-top: 20px;
            border-radius: 6px;
            font-family: monospace;
            max-height: 400px;
            overflow-y: auto;
        }
        .info {
            background: #e6f7ff;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #4facfe;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Тема 12: Асинхронный код</h1>
        <div class="subtitle"></div>

        <div class="info">
            Открой консоль (F12), чтобы видеть дополнительные логи промисов и async-функций.
        </div>

        <button onclick="runAllTasks()">Запустить все задания</button>
        <div id="result"><p>Результаты...</p></div>
    </div>

    <script src="script.js"></script>
    <script>
        async function runAllTasks() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p><strong>Выполняю асинхронные задания...</strong></p>';
            console.clear();

            for (let i = 1; i <= 15; i++) {
                const func = window[`task${i}`];
                if (!func) continue;

                try {
                    const value = await Promise.resolve(func());
                    console.log(`Task ${i}:`, value);
                    resultDiv.innerHTML += `<p>${i}: ${JSON.stringify(value)}</p>`;
                } catch (e) {
                    console.error(`Task ${i} error:`, e);
                    resultDiv.innerHTML += `<p>${i}: ${e}</p>`;
                }
            }
        }
    </script>
</body>
</html>
